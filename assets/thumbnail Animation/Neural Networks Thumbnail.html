<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AI Explained — Thumbnail</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
  rel="stylesheet"
/>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #02040a;
    color: #f4f1ea;
    font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    overflow: hidden;
    height: 100%;
  }
  #root, body { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="root" data-video-root data-screen-label="t=0s"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="scenes.jsx"></script>

<script type="text/babel">
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "palette": "Deep Navy"
  }/*EDITMODE-END*/;

  const PALETTE_NAMES = ["Warm Linen", "Paper White", "Midnight", "Mint", "Plum", "Deep Navy"];

  function App() {
    const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
    return (
      <>
        <LoopStage width={1920} height={1080} background="#02040a">
          <ThumbnailScene paletteName={tweaks.palette} />
        </LoopStage>
        <TweaksPanel title="Tweaks">
          <TweakSection label="Color Palette">
            <TweakSelect
              label="Palette"
              value={tweaks.palette}
              options={PALETTE_NAMES}
              onChange={(v) => setTweak('palette', v)}
            />
            <div style={{ display: 'grid', gap: '8px', marginTop: '10px' }}>
              {PALETTE_NAMES.map((name) => {
                const p = PALETTES[name];
                const selected = tweaks.palette === name;
                return (
                  <button
                    key={name}
                    onClick={() => setTweak('palette', name)}
                    style={{
                      display: 'flex',
                      alignItems: 'center',
                      gap: '10px',
                      padding: '8px 10px',
                      border: selected ? `1.5px solid ${p.accent}` : '1px solid rgba(0,0,0,0.12)',
                      borderRadius: '8px',
                      background: selected ? 'rgba(0,0,0,0.04)' : '#fff',
                      cursor: 'pointer',
                      textAlign: 'left',
                      fontFamily: 'inherit',
                      fontSize: '13px',
                    }}
                  >
                    <span style={{ display: 'flex', gap: '3px' }}>
                      <span style={{ width: 14, height: 22, borderRadius: 3, background: p.bg, border: '1px solid rgba(0,0,0,0.1)' }} />
                      <span style={{ width: 14, height: 22, borderRadius: 3, background: p.accent }} />
                      <span style={{ width: 14, height: 22, borderRadius: 3, background: p.accent2 }} />
                    </span>
                    <span style={{ fontWeight: selected ? 600 : 500 }}>{name}</span>
                  </button>
                );
              })}
            </div>
          </TweakSection>
        </TweaksPanel>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
