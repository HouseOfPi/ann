  <script type="text/babel" data-presets="react">
try {

// animations.jsx
// Reusable animation starter: Stage, Timeline, Sprite, easing helpers.
// Usage (in an HTML file that loads React + Babel):
//
//   <Stage width={1280} height={720} duration={10} background="#f6f4ef">
//     <MyScene />
//   </Stage>
//
// Inside <Stage>, any child can call useTime() to read the current
// playhead (seconds). Or wrap content in <Sprite start={1} end={4}>...</Sprite>
// to only render during that window -- children receive a `localTime` and
// `progress` via the useSprite() hook.
//
// ─────────────────────────────────────────────────────────────────────────────

// ── Easing functions (hand-rolled, Popmotion-style) ─────────────────────────
// All easings take t ∈ [0,1] and return eased t ∈ [0,1] (may overshoot for back/elastic).
const Easing = {
  linear: (t) => t,

  // Quad
  easeInQuad:    (t) => t * t,
  easeOutQuad:   (t) => t * (2 - t),
  easeInOutQuad: (t) => (t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t),

  // Cubic
  easeInCubic:    (t) => t * t * t,
  easeOutCubic:   (t) => (--t) * t * t + 1,
  easeInOutCubic: (t) => (t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1),

  // Quart
  easeInQuart:    (t) => t * t * t * t,
  easeOutQuart:   (t) => 1 - (--t) * t * t * t,
  easeInOutQuart: (t) => (t < 0.5 ? 8 * t * t * t * t : 1 - 8 * (--t) * t * t * t),

  // Expo
  easeInExpo:  (t) => (t === 0 ? 0 : Math.pow(2, 10 * (t - 1))),
  easeOutExpo: (t) => (t === 1 ? 1 : 1 - Math.pow(2, -10 * t)),
  easeInOutExpo: (t) => {
    if (t === 0) return 0;
    if (t === 1) return 1;
    if (t < 0.5) return 0.5 * Math.pow(2, 20 * t - 10);
    return 1 - 0.5 * Math.pow(2, -20 * t + 10);
  },

  // Sine
  easeInSine:    (t) => 1 - Math.cos((t * Math.PI) / 2),
  easeOutSine:   (t) => Math.sin((t * Math.PI) / 2),
  easeInOutSine: (t) => -(Math.cos(Math.PI * t) - 1) / 2,

  // Back (overshoot)
  easeOutBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  },
  easeInBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return c3 * t * t * t - c1 * t * t;
  },
  easeInOutBack: (t) => {
    const c1 = 1.70158, c2 = c1 * 1.525;
    return t < 0.5
      ? (Math.pow(2 * t, 2) * ((c2 + 1) * 2 * t - c2)) / 2
      : (Math.pow(2 * t - 2, 2) * ((c2 + 1) * (t * 2 - 2) + c2) + 2) / 2;
  },

  // Elastic
  easeOutElastic: (t) => {
    const c4 = (2 * Math.PI) / 3;
    if (t === 0) return 0;
    if (t === 1) return 1;
    return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
  },
};

// ── Core interpolation helpers ──────────────────────────────────────────────

// Clamp a value to [min, max]
const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

// interpolate([0, 0.5, 1], [0, 100, 50], ease?) -> fn(t)
// Popmotion-style: linearly maps t across input keyframes to output values,
// with optional easing per segment (single fn or array of fns).
function interpolate(input, output, ease = Easing.linear) {
  return (t) => {
    if (t <= input[0]) return output[0];
    if (t >= input[input.length - 1]) return output[output.length - 1];
    for (let i = 0; i < input.length - 1; i++) {
      if (t >= input[i] && t <= input[i + 1]) {
        const span = input[i + 1] - input[i];
        const local = span === 0 ? 0 : (t - input[i]) / span;
        const easeFn = Array.isArray(ease) ? (ease[i] || Easing.linear) : ease;
        const eased = easeFn(local);
        return output[i] + (output[i + 1] - output[i]) * eased;
      }
    }
    return output[output.length - 1];
  };
}

// animate({from, to, start, end, ease})(t) — simpler single-segment tween.
// Returns `from` before `start`, `to` after `end`.
function animate({ from = 0, to = 1, start = 0, end = 1, ease = Easing.easeInOutCubic }) {
  return (t) => {
    if (t <= start) return from;
    if (t >= end) return to;
    const local = (t - start) / (end - start);
    return from + (to - from) * ease(local);
  };
}

// ── Timeline context ────────────────────────────────────────────────────────

const TimelineContext = React.createContext({ time: 0, duration: 10, playing: false });

const useTime = () => React.useContext(TimelineContext).time;
const useTimeline = () => React.useContext(TimelineContext);

// ── Sprite ──────────────────────────────────────────────────────────────────
// Renders children only when the playhead is inside [start, end]. Provides
// a sub-context with `localTime` (seconds since start) and `progress` (0..1).
//
//   <Sprite start={2} end={5}>
//     {({ localTime, progress }) => <Thing x={progress * 100} />}
//   </Sprite>
//
// Or as a plain wrapper — children can call useSprite() themselves.

const SpriteContext = React.createContext({ localTime: 0, progress: 0, duration: 0 });
const useSprite = () => React.useContext(SpriteContext);

function Sprite({ start = 0, end = Infinity, children, keepMounted = false }) {
  const { time } = useTimeline();
  const visible = time >= start && time <= end;
  if (!visible && !keepMounted) return null;

  const duration = end - start;
  const localTime = Math.max(0, time - start);
  const progress = duration > 0 && isFinite(duration)
    ? clamp(localTime / duration, 0, 1)
    : 0;

  const value = { localTime, progress, duration, visible };

  return (
    <SpriteContext.Provider value={value}>
      {typeof children === 'function' ? children(value) : children}
    </SpriteContext.Provider>
  );
}

// ── Sample sprite components ────────────────────────────────────────────────

// TextSprite: fades/slides text in on entry, holds, then fades out on exit.
// Props: text, x, y, size, color, font, entryDur, exitDur, align
function TextSprite({
  text,
  x = 0, y = 0,
  size = 48,
  color = '#111',
  font = 'Inter, system-ui, sans-serif',
  weight = 600,
  entryDur = 0.45,
  exitDur = 0.35,
  entryEase = Easing.easeOutBack,
  exitEase = Easing.easeInCubic,
  align = 'left',
  letterSpacing = '-0.01em',
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let ty = 0;

  if (localTime < entryDur) {
    const t = entryEase(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    ty = (1 - t) * 16;
  } else if (localTime > exitStart) {
    const t = exitEase(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    ty = -t * 8;
  }

  const translateX = align === 'center' ? '-50%' : align === 'right' ? '-100%' : '0';

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      transform: `translate(${translateX}, ${ty}px)`,
      opacity,
      fontFamily: font,
      fontSize: size,
      fontWeight: weight,
      color,
      letterSpacing,
      whiteSpace: 'pre',
      lineHeight: 1.1,
      willChange: 'transform, opacity',
    }}>
      {text}
    </div>
  );
}

// ImageSprite: scales + fades in; optional Ken Burns drift during hold.
function ImageSprite({
  src,
  x = 0, y = 0,
  width = 400, height = 300,
  entryDur = 0.6,
  exitDur = 0.4,
  kenBurns = false,
  kenBurnsScale = 1.08,
  radius = 12,
  fit = 'cover',
  placeholder = null, // {label: string} for striped placeholder
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutCubic(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    scale = 0.96 + 0.04 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInCubic(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = (kenBurns ? kenBurnsScale : 1) + 0.02 * t;
  } else if (kenBurns) {
    const holdSpan = exitStart - entryDur;
    const holdT = holdSpan > 0 ? (localTime - entryDur) / holdSpan : 0;
    scale = 1 + (kenBurnsScale - 1) * holdT;
  }

  const content = placeholder ? (
    <div style={{
      width: '100%', height: '100%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: 'repeating-linear-gradient(135deg, #e9e6df 0 10px, #dcd8cf 10px 20px)',
      color: '#6b6458',
      fontFamily: 'JetBrains Mono, ui-monospace, monospace',
      fontSize: 13,
      letterSpacing: '0.04em',
      textTransform: 'uppercase',
    }}>
      {placeholder.label || 'image'}
    </div>
  ) : (
    <img src={src} alt="" style={{ width: '100%', height: '100%', objectFit: fit, display: 'block' }} />
  );

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      borderRadius: radius,
      overflow: 'hidden',
      willChange: 'transform, opacity',
    }}>
      {content}
    </div>
  );
}

// RectSprite: simple rectangle that animates position/size/color via props.
// Useful demo primitive — takes a `render` fn for per-frame customization.
function RectSprite({
  x = 0, y = 0,
  width = 100, height = 100,
  color = '#111',
  radius = 8,
  entryDur = 0.4,
  exitDur = 0.3,
  render, // optional: (ctx) => style overrides
}) {
  const spriteCtx = useSprite();
  const { localTime, duration } = spriteCtx;
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutBack(clamp(localTime / entryDur, 0, 1));
    opacity = clamp(localTime / entryDur, 0, 1);
    scale = 0.4 + 0.6 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInQuad(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = 1 - 0.15 * t;
  }

  const overrides = render ? render(spriteCtx) : {};

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      background: color,
      borderRadius: radius,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      willChange: 'transform, opacity',
      ...overrides,
    }} />
  );
}


function Stage({
  width = 1280,
  height = 720,
  duration = 10,
  startTime = 3.0,
  background = '#f6f4ef',
  fps = 60,
  loop = true,
  autoplay = true,
  persistKey = 'animstage',
  children,
}) {
  const [time, setTime] = React.useState(startTime);
  const [playing, setPlaying] = React.useState(autoplay);
  const [hoverTime, setHoverTime] = React.useState(null);
  const [scale, setScale] = React.useState(1);

  const stageRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const lastTsRef = React.useRef(null);

  // Auto-scale to fit viewport
  React.useEffect(() => {
    if (!stageRef.current) return;
    const el = stageRef.current;
    const measure = () => {
      const barH = 44; // playback bar height
      const s = Math.min(
        el.clientWidth / width,
        (el.clientHeight - barH) / height
      );
      setScale(Math.max(0.05, s));
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    window.addEventListener('resize', measure);
    return () => {
      ro.disconnect();
      window.removeEventListener('resize', measure);
    };
  }, [width, height]);

  // Animation loop
  React.useEffect(() => {
    if (!playing) {
      lastTsRef.current = null;
      return;
    }
    const step = (ts) => {
      if (lastTsRef.current == null) lastTsRef.current = ts;
      const dt = (ts - lastTsRef.current) / 1000;
      lastTsRef.current = ts;
      setTime((t) => {
        let next = t + dt;
        if (next >= duration) {
          if (loop) next = startTime + (next - duration);
          else { next = duration; setPlaying(false); }
        }
        return next;
      });
      rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    return () => {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      lastTsRef.current = null;
    };
  }, [playing, duration, loop]);

  // Handle external reset messages
  React.useEffect(() => {
    const handleReset = (e) => {
      if (e.data && e.data.type === 'RESET_ANIMATION') {
        setTime(startTime);
        setPlaying(true);
      }
    };
    window.addEventListener('message', handleReset);
    return () => window.removeEventListener('message', handleReset);
  }, [startTime]);

  // Keyboard: space = play/pause, ← → = seek
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'BUTTON')) return;
      if (e.code === 'Space') {
        e.preventDefault();
        setPlaying(p => !p);
      } else if (e.code === 'ArrowLeft') {
        setTime(t => clamp(t - (e.shiftKey ? 1 : 0.1), startTime, duration));
      } else if (e.code === 'ArrowRight') {
        setTime(t => clamp(t + (e.shiftKey ? 1 : 0.1), startTime, duration));
      } else if (e.key === '0' || e.code === 'Home') {
        setTime(startTime);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [duration, startTime]);

  const displayTime = hoverTime != null ? hoverTime : time;

  const ctxValue = React.useMemo(
    () => ({ time: displayTime, duration, playing, setTime, setPlaying }),
    [displayTime, duration, playing]
  );

  return (
    <div
      ref={stageRef}
      onClick={(e) => {
        if (e.target.tagName !== 'BUTTON') setPlaying(p => !p);
      }}
      style={{
        position: 'absolute', inset: 0,
        display: 'flex', flexDirection: 'column',
        alignItems: 'center',
        background: 'transparent',
        fontFamily: 'Inter, system-ui, sans-serif',
        cursor: 'pointer',
        padding: '40px',
      }}
    >
      {/* Canvas area — vertically centered in remaining space */}
      <div style={{
        flex: 1,
        width: '100%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        overflow: 'hidden',
        minHeight: 0,
      }}>
        <div
          ref={canvasRef}
          style={{
            width, height,
            background: 'transparent',
            position: 'relative',
            transform: `scale(${scale})`,
            transformOrigin: 'center',
            flexShrink: 0,
            boxShadow: 'none',
            overflow: 'hidden',
          }}
        >
          <TimelineContext.Provider value={ctxValue}>
            {children}
          </TimelineContext.Provider>
        </div>
      </div>

      <div style={{ position: 'absolute', top: '24px', right: '24px', display: 'flex', gap: '12px', zIndex: 2100 }}>
        <ResetButton onReset={() => { setTime(startTime); setPlaying(true); }} />
        <PlayPauseButton playing={playing} toggle={() => setPlaying(p => !p)} />
      </div>
    </div>
  );
}

function ResetButton({ onReset }) {
  const [hover, setHover] = React.useState(false);
  const C = COLORS;
  return (
    <button
      onClick={(e) => { e.stopPropagation(); onReset(); }}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        width: '48px',
        height: '48px',
        borderRadius: '50%',
        background: hover ? 'rgba(0,0,0,0.08)' : 'rgba(0,0,0,0.03)',
        border: `1.5px solid ${C.line}`,
        color: C.ink,
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        cursor: 'pointer',
        transition: 'all 0.2s cubic-bezier(0.4, 0, 0.2, 1)',
        backdropFilter: 'blur(8px)',
        transform: hover ? 'scale(1.05)' : 'scale(1)',
      }}
      title="Reset to Start"
    >
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 5V1L7 6L12 11V7C15.31 7 18 9.69 18 13C18 16.31 15.31 19 12 19C8.69 19 6 16.31 6 13H4C4 17.42 7.58 21 12 21C16.42 21 20 17.42 20 13C20 8.58 16.42 5 12 5Z" />
      </svg>
    </button>
  );
}

function PlayPauseButton({ playing, toggle }) {
  const [hover, setHover] = React.useState(false);
  const C = COLORS;
  return (
    <button
      onClick={(e) => { e.stopPropagation(); toggle(); }}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        width: '48px',
        height: '48px',
        borderRadius: '50%',
        background: hover ? 'rgba(0,0,0,0.08)' : 'rgba(0,0,0,0.03)',
        border: `1.5px solid ${C.line}`,
        color: C.ink,
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        cursor: 'pointer',
        transition: 'all 0.2s cubic-bezier(0.4, 0, 0.2, 1)',
        backdropFilter: 'blur(8px)',
        transform: hover ? 'scale(1.05)' : 'scale(1)',
      }}
      title={playing ? "Pause" : "Play"}
    >
      {playing ? (
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="4" width="3.5" height="16" rx="1" />
          <rect x="14.5" y="4" width="3.5" height="16" rx="1" />
        </svg>
      ) : (
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style={{ marginLeft: '2px' }}>
          <path d="M7 4.5V19.5L19 12L7 4.5Z" />
        </svg>
      )}
    </button>
  );
}

// ── Playback bar ────────────────────────────────────────────────────────────
// Play/pause, return-to-begin, scrub track, time display.
// Uses fixed-width time fields so layout doesn't thrash.

function PlaybackBar({ time, duration, playing, onPlayPause, onReset, onSeek, onHover }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);

  const timeFromEvent = React.useCallback((e) => {
    const rect = trackRef.current.getBoundingClientRect();
    const x = clamp((e.clientX - rect.left) / rect.width, 0, 1);
    return x * duration;
  }, [duration]);

  const onTrackMove = (e) => {
    if (!trackRef.current) return;
    const t = timeFromEvent(e);
    if (dragging) {
      onSeek(t);
    } else {
      onHover(t);
    }
  };

  const onTrackLeave = () => {
    if (!dragging) onHover(null);
  };

  const onTrackDown = (e) => {
    setDragging(true);
    const t = timeFromEvent(e);
    onSeek(t);
    onHover(null);
  };

  React.useEffect(() => {
    if (!dragging) return;
    const onUp = () => setDragging(false);
    const onMove = (e) => {
      if (!trackRef.current) return;
      const t = timeFromEvent(e);
      onSeek(t);
    };
    window.addEventListener('mouseup', onUp);
    window.addEventListener('mousemove', onMove);
    return () => {
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('mousemove', onMove);
    };
  }, [dragging, timeFromEvent, onSeek]);

  get(_, key) { return PALETTES[CURRENT_PALETTE][key]; }
});

// Subscribers so components re-render on palette change
const paletteSubs = new Set();
function setPalette(name) {
  if (!PALETTES[name]) return;
  CURRENT_PALETTE = name;
  paletteSubs.forEach(fn => fn());
}
function usePaletteVersion() {
  const [, force] = React.useReducer(x => x + 1, 0);
  React.useEffect(() => {
    paletteSubs.add(force);
    const handleMessage = (e) => {
      if (!e.data) return;
      if (e.data.type === 'SET_THEME') {
        // Prefer explicit palette name when provided by parent
        if (e.data.palette && PALETTES[e.data.palette]) {
          setPalette(e.data.palette);
          return;
        }
        let m = e.data.mode;
        if (m === 'custom') setPalette('Warm Linen');
        else if (m === 'light') setPalette('Paper White');
        else if (m === 'dark') setPalette('Midnight');
      }
    };
    window.addEventListener('message', handleMessage);
    try { window.parent.postMessage({ type: 'GET_THEME' }, '*'); } catch (e) {}
    return () => {
      paletteSubs.delete(force);
      window.removeEventListener('message', handleMessage);
    };
  }, []);
  return CURRENT_PALETTE;
}

// Get a point along a straight line from a→b at progress t (0..1)
function lerpPoint(a, b, t) {
  return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t };
}

// ─── Connection lines (drawn with SVG for nice stroke animation) ─────────
function Connections({ drawStart = 4.0, drawDur = 1.2 }) {
  const t = useTime();

  return (
    <svg style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', pointerEvents: 'none' }}
         viewBox="0 0 1920 1080">
      {INPUT_POSITIONS.map((p, i) => {
        // Connection endpoint on neuron edge — compute along line from input to neuron center
        const dx = CX - p.x, dy = CY - p.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const endX = CX - (dx / dist) * NEURON_R;
        const endY = CY - (dy / dist) * NEURON_R;

        const startX = p.x + (dx / dist) * 36;
        const startY = p.y + (dy / dist) * 36;

        const segLen = Math.sqrt((endX - startX) ** 2 + (endY - startY) ** 2);

        const delay = drawStart + i * 0.1;
        const progress = clamp(animate({
          from: 0, to: 1, start: delay, end: delay + drawDur, ease: Easing.easeInOutCubic
        })(t), 0, 1);

        // Line width scales with |weight| for visual interest
        const strokeW = 1.5 + Math.abs(WEIGHTS[i]) * 4;

        return (
          <line key={i}
                x1={startX} y1={startY} x2={endX} y2={endY}
                stroke={COLORS.line}
                strokeWidth={strokeW}
                strokeLinecap="round"
                strokeDasharray={segLen}
                strokeDashoffset={segLen * (1 - progress)}
          />
        );
      })}
      {/* Bias connection — dashed, thinner */}
      {(() => {
        const dx = CX - BIAS_POS.x, dy = CY - BIAS_POS.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const sx = BIAS_POS.x + (dx/dist) * 28;
        const sy = BIAS_POS.y + (dy/dist) * 28;
        const ex = CX - (dx/dist) * NEURON_R;
        const ey = CY - (dy/dist) * NEURON_R;
        const segLen = Math.sqrt((ex-sx)**2 + (ey-sy)**2);
        const delay = drawStart + N_INPUTS * 0.1;
        const progress = clamp(animate({ from:0, to:1, start:delay, end:delay+drawDur, ease:Easing.easeInOutCubic })(t), 0, 1);
        if (progress === 0) return null;
        // Animate a solid line revealing the dashed pattern by clipping via a second stroke
        const visibleLen = segLen * progress;
        const angle = Math.atan2(ey - sy, ex - sx);
        const cex = sx + Math.cos(angle) * visibleLen;
        const cey = sy + Math.sin(angle) * visibleLen;
        return (
          <line x1={sx} y1={sy} x2={cex} y2={cey}
            stroke={COLORS.dim} strokeWidth={1.5} strokeLinecap="round"
            strokeDasharray="4 6"
            opacity={0.7}
          />
        );
      })()}
      {/* Output line */}
      <OutputLine />
    </svg>
  );
}

function OutputLine() {
  const t = useTime();
  const drawStart = 4.4;
  const segLen = OUTPUT_X - (CX + NEURON_R);
  const progress = clamp(animate({
    from: 0, to: 1, start: drawStart, end: drawStart + 1.0, ease: Easing.easeInOutCubic,
  })(t), 0, 1);

  return (
    <line x1={CX + NEURON_R} y1={CY} x2={OUTPUT_X - 40} y2={CY}
          stroke={COLORS.line} strokeWidth={4} strokeLinecap="round"
          strokeDasharray={segLen}
          strokeDashoffset={segLen * (1 - progress)}
    />
  );
}

// ─── Pulses traveling down the input lines ───────────────────────────────
// Each pulse: leaves input at ~t=8 + i*0.12, arrives at neuron ~1.0s later.
function InputPulses() {
  const t = useTime();

  return (
    <>
      {INPUT_POSITIONS.map((p, i) => {
        const dx = CX - p.x, dy = CY - p.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const startX = p.x + (dx / dist) * 36;
        const startY = p.y + (dy / dist) * 36;
        const endX = CX - (dx / dist) * NEURON_R;
        const endY = CY - (dy / dist) * NEURON_R;

        const launch = 8.5;
        const travel = 1.8;
        const prog = clamp(animate({
          from: 0, to: 1, start: launch, end: launch + travel, ease: Easing.easeInOutCubic,
        })(t), 0, 1);

        if (prog === 0 || prog === 1) return null;

        const cur = lerpPoint({ x: startX, y: startY }, { x: endX, y: endY }, prog);

        // Size reflects weight magnitude
        const size = 18 + Math.abs(WEIGHTS[i]) * 16;
        // Color: positive weight → accent, negative → warm
        const color = WEIGHTS[i] >= 0 ? COLORS.accent : COLORS.accent2;

        return (
          <div key={i} style={{
            position: 'absolute',
            left: cur.x - size / 2, top: cur.y - size / 2,
            width: size, height: size,
            borderRadius: '50%',
            background: color,
            boxShadow: `0 0 20px ${color}`,
            opacity: 0.85,
          }}/>
        );
      })}
    </>
  );
}

// ─── Bias pulse — travels alongside input pulses ─────────────────────────
function BiasPulse() {
  const t = useTime();
  const dx = CX - BIAS_POS.x, dy = CY - BIAS_POS.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const sx = BIAS_POS.x + (dx/dist) * 28;
  const sy = BIAS_POS.y + (dy/dist) * 28;
  const ex = CX - (dx/dist) * NEURON_R;
  const ey = CY - (dy/dist) * NEURON_R;
  const launch = 8.5;
  const travel = 1.8;

      opacity: 0.8,

}

// ─── Sound system ────────────────────────────────────────────────────────
// Synthesized tones via Web Audio API — no external files needed.
// Cue list tied to the timeline:
//   3.0  — neuron appears (soft low thud)
//   3.3, 3.38, 3.46, 3.54 — input nodes pop in (short clicks)
//   8.5  — pulses launch (swoosh up)
//  10.3  — pulses arrive, summation begins (sustained pad)
//  15.0  — activation fires (bright chord)
//  16.2  — output pulse launches (rising tone)
//  18.0  — output arrives (confirmation beep)

function useSoundEngine(enabled) {
  const ctxRef = React.useRef(null);
  const firedRef = React.useRef(new Set());
  const { time, playing } = useTimeline();
  const lastTimeRef = React.useRef(0);

  // Init/close audio context
  React.useEffect(() => {
    if (enabled && !ctxRef.current) {
      try {
        ctxRef.current = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) {}
    }
    return () => {};
  }, [enabled]);

  // Reset fired cues when scrubbing backwards
  React.useEffect(() => {
    if (time < lastTimeRef.current - 0.3) {
      firedRef.current = new Set();
    }
    lastTimeRef.current = time;
  }, [time]);

  // Cue table
  const cues = React.useMemo(() => [
    { t: 3.0,   id: 'neuron_appear',  play: playThud },
    { t: 3.30,  id: 'in0',            play: () => playClick(880) },
    { t: 3.38,  id: 'in1',            play: () => playClick(988) },
    { t: 3.46,  id: 'in2',            play: () => playClick(1100) },
    { t: 3.54,  id: 'in3',            play: () => playClick(1320) },
    { t: 7.2,   id: 'weights',        play: () => playClick(660, 0.18) },
    { t: 8.5,   id: 'launch',         play: playSwoosh },
    { t: 10.3,  id: 'arrive',         play: playArrive },
    { t: 11.0,  id: 'sum_formula',    play: () => playClick(523, 0.2) },
    { t: 13.0,  id: 'z_value',        play: () => playClick(659, 0.25) },
    { t: 15.0,  id: 'fire',           play: playFire },
    { t: 16.2,  id: 'output_launch',  play: playRise },
    { t: 18.0,  id: 'output_arrive',  play: playConfirm },
  ], []);

  React.useEffect(() => {
    if (!enabled || !playing || !ctxRef.current) return;
    const ctx = ctxRef.current;
    if (ctx.state === 'suspended') ctx.resume();

    for (const cue of cues) {
      if (!firedRef.current.has(cue.id) && time >= cue.t && time < cue.t + 0.3) {
        firedRef.current.add(cue.id);
        try { cue.play(ctx); } catch (e) {}
      }
    }
  }, [time, enabled, playing, cues]);

  // Sound primitives
  function envelope(ctx, osc, gain, startVol, decay, now) {
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(startVol, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + decay);
    osc.start(now);
    osc.stop(now + decay + 0.05);
  }

  function playClick(freq, decay = 0.12) {
    const ctx = ctxRef.current; if (!ctx) return;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, now);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.7, now + decay);
    osc.connect(gain).connect(ctx.destination);
    envelope(ctx, osc, gain, 0.12, decay, now);
  }

  function playThud(ctx) {
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(160, now);
    osc.frequency.exponentialRampToValueAtTime(60, now + 0.5);
    osc.connect(gain).connect(ctx.destination);
    envelope(ctx, osc, gain, 0.25, 0.5, now);
  }

  function playSwoosh(ctx) {
    const now = ctx.currentTime;
    // Filtered noise swoosh
    const buffer = ctx.createBuffer(1, ctx.sampleRate * 0.6, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
    const src = ctx.createBufferSource();
    src.buffer = buffer;
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(400, now);
    filter.frequency.exponentialRampToValueAtTime(2000, now + 0.5);
    filter.Q.value = 2;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.15, now + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    src.connect(filter).connect(gain).connect(ctx.destination);
    src.start(now); src.stop(now + 0.6);
  }

  function playArrive(ctx) {
    const now = ctx.currentTime;
    // Low pad sustain
    const freqs = [220, 277, 330];
    freqs.forEach((f, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = f;
      osc.connect(gain).connect(ctx.destination);
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.06, now + 0.2);
      gain.gain.setValueAtTime(0.06, now + 2.5);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 4.0);
      osc.start(now); osc.stop(now + 4.1);
    });
  }

  function playFire(ctx) {
    const now = ctx.currentTime;
    // Bright triad
    const freqs = [523.25, 659.25, 783.99]; // C-E-G
    freqs.forEach((f, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = f;
      osc.connect(gain).connect(ctx.destination);
      gain.gain.setValueAtTime(0, now + i * 0.04);
      gain.gain.linearRampToValueAtTime(0.1, now + i * 0.04 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
      osc.start(now + i * 0.04); osc.stop(now + 1.3);
    });
  }

  function playRise(ctx) {
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(440, now);
    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.8);
    osc.connect(gain).connect(ctx.destination);
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.1, now + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.9);
    osc.start(now); osc.stop(now + 1.0);
  }

  function playConfirm(ctx) {
    const now = ctx.currentTime;
    [880, 1320].forEach((f, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = f;
      osc.connect(gain).connect(ctx.destination);
      gain.gain.setValueAtTime(0, now + i * 0.08);
      gain.gain.linearRampToValueAtTime(0.12, now + i * 0.08 + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.35);
      osc.start(now + i * 0.08); osc.stop(now + i * 0.08 + 0.4);
    });
  }
}

  const [active, setActive] = React.useState(false);
  const current = usePaletteVersion();

  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setActive(true);
      else if (d.type === '__deactivate_edit_mode') setActive(false);
    };
    window.addEventListener('message', onMsg);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (e) {}
    return () => window.removeEventListener('message', onMsg);

  if (!active) return null;

  const pick = (name) => {
    setPalette(name);
    try {
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { palette: name } }, '*');

        fontSize: 13, letterSpacing: '0.18em', textTransform: 'uppercase',

      }}>Tweaks</div>

        Color palette

          const selected = name === current;
          return (
            <button key={name} onClick={() => pick(name)}
              style={{
                display: 'flex', alignItems: 'center', gap: 14,
                padding: '10px 12px',
                background: selected ? (CURRENT_PALETTE === 'Midnight' ? '#242938' : '#f6f3ec') : 'transparent',
                border: `1.5px solid ${selected ? p.accent : panelBorder}`,
                borderRadius: 10,
                cursor: 'pointer',
                textAlign: 'left',
                color: panelText,
                fontFamily: FONT_SANS,
                transition: 'all 0.15s',

            >
              {/* swatches */}

                  <div key={i} style={{
                    width: 22, height: 22, borderRadius: 5,
                    background: c,
                    border: `1px solid ${panelBorder}`,
                  }}/>
                ))}
              </div>
              <div style={{ flex: 1, fontSize: 15, fontWeight: 500 }}>{name}</div>
              {selected && (
                <div style={{
                  width: 18, height: 18, borderRadius: '50%',

// network_scene.jsx — Multi-layer network scene

const NET_LAYER_SIZES = [3, 5, 4, 2];
const NET_LAYER_LABELS = ['Input', 'Hidden', 'Hidden', 'Output'];
const NET_LAYER_X = [320, 760, 1200, 1640];
const NET_NODE_R = 38;

const netLayerPositions = NET_LAYER_SIZES.map((n, li) => {
  const spacing = 130;
  const y0 = (1080 - spacing * (n - 1)) / 2;
  return Array.from({ length: n }, (_, i) => ({ x: NET_LAYER_X[li], y: y0 + i * spacing }));
});

const NET_INPUT_VALUES = [0.8, 0.4, 0.9];

function netHashedWeight(li, i, j) {
  const seed = (li * 991 + i * 97 + j * 31) % 100;
  return (seed - 50) / 50;
}

const NET_ACTIVATIONS = (() => {
  const act = [NET_INPUT_VALUES];
  for (let li = 0; li < NET_LAYER_SIZES.length - 1; li++) {
    const next = [];
    for (let j = 0; j < NET_LAYER_SIZES[li + 1]; j++) {
      let sum = 0;
      for (let i = 0; i < NET_LAYER_SIZES[li]; i++) {
        sum += act[li][i] * netHashedWeight(li, i, j);
      }
      next[j] = 1 / (1 + Math.exp(-sum));
    }
    act.push(next);
  }
  return act;
})();

function NetTitle() {

  const op = clamp(appear - fade, 0, 1);

  return (

      <div style={{ fontSize:56, fontWeight:600, color:COLORS.ink, letterSpacing:'-0.02em', marginTop:10 }}>Many Neurons, In Layers</div>
    </div>

}

function NetLayerLabels() {

          fontFamily:FONT_SANS, fontWeight:500, opacity:op,
        }}>
          Layer {i+1}<br/>

}

function NetConnections() {
  const t = useTime();
  return (
    <svg style={{ position:'absolute', inset:0, width:'100%', height:'100%', pointerEvents:'none' }} viewBox="0 0 1920 1080">
      {netLayerPositions.slice(0, -1).map((srcLayer, li) => {
        const dstLayer = netLayerPositions[li + 1];
        const drawStart = 2.0 + li * 0.6;
        return srcLayer.flatMap((src, i) =>
          dstLayer.map((dst, j) => {
            const dx = dst.x - src.x, dy = dst.y - src.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const sx = src.x + (dx/dist) * NET_NODE_R, sy = src.y + (dy/dist) * NET_NODE_R;
            const ex = dst.x - (dx/dist) * NET_NODE_R, ey = dst.y - (dy/dist) * NET_NODE_R;
            const w = netHashedWeight(li, i, j);
            const segLen = Math.sqrt((ex-sx)**2 + (ey-sy)**2);
            const prog = clamp(animate({ from:0, to:1, start:drawStart, end:drawStart+1.0 })(t), 0, 1);
            const labelProg = clamp(animate({ from:0, to:1, start:drawStart + 0.5, end:drawStart+1.2 })(t), 0, 1);
            const midX = sx + (ex - sx) * 0.5;
            const midY = sy + (ey - sy) * 0.5;

            return (
              <React.Fragment key={`${li}-${i}-${j}`}>
                <line x1={sx} y1={sy} x2={ex} y2={ey}
                  stroke={COLORS.line} strokeOpacity={0.4 + Math.abs(w) * 0.4}
                  strokeWidth={0.8 + Math.abs(w) * 2}
                  strokeLinecap="round"
                  strokeDasharray={segLen}
                  strokeDashoffset={segLen * (1 - prog)}
                />
                {labelProg > 0 && (
                  <text x={midX} y={midY - 8} 
                    fill={COLORS.dim} fontSize="11" fontFamily={FONT_MONO} 
                    textAnchor="middle" style={{ opacity: labelProg * 0.6, pointerEvents: 'none' }}>
                    {w > 0 ? '+' : ''}{w.toFixed(1)}
                  </text>
                )}
              </React.Fragment>
            );
          })
        );
      })}
    </svg>
  );
}

function NetNodes() {
  const t = useTime();
  const [hoveredNode, setHoveredNode] = React.useState(null);
  return (
    <>
      {netLayerPositions.flatMap((layer, li) => layer.map((p, i) => {
        const delay = 0.4 + li * 0.4 + i * 0.05;
        const appear = animate({ from:0, to:1, start:delay, end:delay+0.5, ease:Easing.easeOutBack })(t);
        if (appear === 0) return null;
        const fireTime = 5 + li * 1.4;
        const fireOp = animate({ from:0, to:1, start:fireTime, end:fireTime+0.4 })(t)
                     - animate({ from:0, to:1, start:fireTime+1.2, end:fireTime+2.0 })(t);
        const glow = clamp(fireOp, 0, 1);
        const strength = 0.3 + ((li * 13 + i * 7) % 100) / 140;
        const isInput = li === 0;
        const isOutput = li === NET_LAYER_SIZES.length - 1;
        const activation = NET_ACTIVATIONS[li][i];
        
        // Appear only when the data pulse "reaches" this layer
        const reached = isInput 
          ? animate({ from:0, to:1, start:1.0, end:1.5 })(t)
          : animate({ from:0, to:1, start:fireTime, end:fireTime+0.2 })(t);

        return (
          <div key={`${li}-${i}`} 
            onMouseEnter={() => setHoveredNode({ li, i, x: p.x, y: p.y })}
            onMouseLeave={() => setHoveredNode(null)}
            style={{
              position:'absolute',
              left: p.x - NET_NODE_R, top: p.y - NET_NODE_R,
              width: NET_NODE_R*2, height: NET_NODE_R*2,
              transform:`scale(${appear})`,
              cursor: li > 0 ? 'pointer' : 'default',
              zIndex: hoveredNode?.li === li && hoveredNode?.i === i ? 100 : 10
            }}>
            {glow > 0.05 && (
              <div style={{
                position:'absolute', inset:-18,
                borderRadius:'50%',
                background:`radial-gradient(circle, ${isOutput ? COLORS.accent2 : COLORS.accent} 0%, transparent 65%)`,
                opacity: glow * 0.55,
                filter:'blur(8px)',
              }}/>
            )}
            <div style={{
              position:'absolute', inset:0,
              borderRadius:'50%',
              background: COLORS.neuronFill,
              border:`2px solid ${isInput ? COLORS.ink : isOutput ? COLORS.accent2 : COLORS.neuron}`,
              overflow:'hidden',
              display: 'flex', alignItems: 'center', justifyContent: 'center'
            }}>
              <div style={{
                position:'absolute', left:0, right:0, bottom:0,
                height: `${reached * activation * 100}%`,
                background: isOutput ? COLORS.accent2 : COLORS.accent,
                opacity: 0.8,
                transition: 'height 0.1s',
              }}/>
              <div style={{ 
                position: 'relative', zIndex: 2, 
                fontFamily: FONT_MONO, fontSize: 13, fontWeight: 600,
                color: (glow * activation > 0.5 || reached * activation > 0.6) ? '#fff' : COLORS.ink,
                opacity: reached
              }}>
                {activation.toFixed(2)}
              </div>
            </div>
          </div>
        );
      }))}
      {hoveredNode && hoveredNode.li > 0 && (() => {
        const hLi = hoveredNode.li;
        const hI = hoveredNode.i;
        let sum = 0;
        return (
          <div style={{
            position: 'absolute',
            left: hoveredNode.x + NET_NODE_R + 15,
            top: hoveredNode.y - NET_NODE_R,
            background: 'rgba(0,0,0,0.85)',
            border: `1px solid ${COLORS.line}`,
            backdropFilter: 'blur(10px)',
            padding: '16px 20px',
            borderRadius: 12,
            color: '#fff',
            fontFamily: FONT_MONO,
            fontSize: 13,
            zIndex: 1000,
            pointerEvents: 'none',
            boxShadow: '0 8px 32px rgba(0,0,0,0.3)',
          }}>
            <div style={{ marginBottom: 10, color: COLORS.dim, fontFamily: FONT_SANS, fontSize: 11, letterSpacing: '0.1em', textTransform: 'uppercase', fontWeight: 600 }}>
              Calculations
            </div>
            {NET_ACTIVATIONS[hLi - 1].map((act, j) => {
              const w = netHashedWeight(hLi - 1, j, hI);
              const val = act * w;
              sum += val;
              return (
                <div key={j} style={{ display: 'flex', justifyContent: 'space-between', gap: 32, marginBottom: 6 }}>
                  <span style={{ color: COLORS.dim }}>x<sub style={{fontSize:9}}>{j+1}</sub> · w<sub style={{fontSize:9}}>{j+1}</sub></span>
                  <span>{act.toFixed(2)} × {w > 0 ? '+' : ''}{w.toFixed(2)} = <span style={{ color: val >= 0 ? COLORS.accent : COLORS.accent2 }}>{val > 0 ? '+' : ''}{val.toFixed(2)}</span></span>
                </div>
              );
            })}
            <div style={{ borderTop: `1px solid ${COLORS.line}`, margin: '10px 0', paddingTop: 10, display: 'flex', justifyContent: 'space-between' }}>
              <span style={{ color: COLORS.dim }}>Sum (z)</span>
              <span>{sum.toFixed(2)}</span>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between' }}>
              <span style={{ color: COLORS.dim }}>Sigmoid ƒ(z)</span>
              <span style={{ color: COLORS.accent, fontWeight: 600 }}>{NET_ACTIVATIONS[hLi][hI].toFixed(2)}</span>
            </div>
          </div>
        );
      })()}
    </>
  );
}

function NetPulses() {
  const t = useTime();
  const pulses = [];
  for (let li = 0; li < NET_LAYER_SIZES.length - 1; li++) {
    const launch = 5 + li * 1.4;
    const travel = 1.2;
    const src = netLayerPositions[li];
    const dst = netLayerPositions[li + 1];
    for (let i = 0; i < src.length; i++) {
      for (let j = 0; j < dst.length; j++) {
        const w = netHashedWeight(li, i, j);
        if (Math.abs(w) < 0.25) continue;
        const prog = clamp(animate({ from:0, to:1, start:launch, end:launch+travel, ease:Easing.easeInOutCubic })(t), 0, 1);
        if (prog === 0 || prog === 1) continue;
        const dx = dst[j].x - src[i].x, dy = dst[j].y - src[i].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const sx = src[i].x + (dx/dist) * NET_NODE_R, sy = src[i].y + (dy/dist) * NET_NODE_R;
        const ex = dst[j].x - (dx/dist) * NET_NODE_R, ey = dst[j].y - (dy/dist) * NET_NODE_R;
        const cx = sx + (ex-sx) * prog, cy = sy + (ey-sy) * prog;
        const size = 8 + Math.abs(w) * 10;
        const color = w >= 0 ? COLORS.accent : COLORS.accent2;
        pulses.push(
          <div key={`${li}-${i}-${j}`} style={{
            position:'absolute', left: cx - size/2, top: cy - size/2,
            width:size, height:size, borderRadius:'50%',
            background: color, boxShadow:`0 0 14px ${color}`,
            opacity: 0.7,
          }}/>
        );
      }
    }
  }
  return <>{pulses}</>;
}

function NetCaption() {
  const t = useTime();
  const captions = [
    { start: 4.0, end: 5.2, text: 'Inputs enter the network' },
    { start: 5.2, end: 7.5, text: 'Each neuron computes its weighted sum' },
    { start: 7.5, end: 9.0, text: 'Activations flow forward, layer by layer' },
    { start: 9.0, end: 13.0, text: 'The final layer produces a prediction' },
    { start: 13.5, end: 15.5, text: 'One forward pass · Σ wᵢxᵢ + b, applied everywhere' },
  ];
  for (const c of captions) {
    if (t >= c.start && t < c.end) {
      const localT = t - c.start;
      const dur = c.end - c.start;
      let op = 1;
      if (localT < 0.3) op = localT / 0.3;
      else if (localT > dur - 0.3) op = (dur - localT) / 0.3;
      return (
        <div style={{
          position:'absolute', left:0, right:0, bottom:80, textAlign:'center',
          fontFamily:FONT_SANS, fontSize:26, fontWeight:500, color:COLORS.ink,
          opacity: clamp(op, 0, 1),
        }}>{c.text}</div>
      );
    }
  }
  return null;
}

  return (
    <Stage key={key} width={1920} height={1080} duration={21} background={PALETTES[CURRENT_PALETTE].bg} loop={false} persistKey="neuron-anim">
      <NeuronScene />
    </Stage>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
} catch(e) {
  const box = document.getElementById('errbox');
  if (box) { box.style.display = 'block'; box.textContent = 'CAUGHT: ' + e.message + '\n' + (e.stack || ''); }
}
  </script>
</body>
</html>
