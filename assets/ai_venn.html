<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI · ML · Deep Learning</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
  :root {
    --ai-color: #38bdf8;
    --ml-color: #10b981;
    --dl-color: #f97316;
    --nn-color: #f472b6;
    --text-main: #e8ecf5;
    --text-dim: #94a3b8;
    --bg-page: transparent;
  }
  [data-theme="paper-white"],
  [data-theme="warm-linen"] {
    --ai-color: #0284c7;
    --ml-color: #059669;
    --dl-color: #ea580c;
    --nn-color: #db2777;
    --text-main: #0f172a;
    --text-dim: #475569;
  }
  [data-theme="midnight"] {
    --ai-color: #38bdf8;
    --ml-color: #10b981;
    --dl-color: #f97316;
    --nn-color: #f472b6;
    --text-main: #f5f5f5;
    --text-dim: #94a3b8;
  }
  [data-theme="mint"] {
    --ai-color: #0284c7;
    --ml-color: #10b981;
    --dl-color: #f97316;
    --nn-color: #ec4899;
    --text-main: #0f2e1e;
    --text-dim: #065f46;
  }
  [data-theme="plum"] {
    --ai-color: #9d4fb3;
    --ml-color: #ec4899;
    --dl-color: #f59e0b;
    --nn-color: #38bdf8;
    --text-main: #2b1a33;
    --text-dim: #6b4a78;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg-page);
    color: var(--text-main);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .stage {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .venn-wrap {
    position: relative;
    width: min(1100px, 96vw);
    height: min(640px, 88vh);
  }
  svg.venn-svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .ring ellipse {
    fill-opacity: 0;
    stroke-width: 2.2;
  }
  .ring ellipse.filled { fill-opacity: 0.08; transition: fill-opacity 0.8s ease; }
  [data-theme="paper-white"] .ring ellipse.filled,
  [data-theme="warm-linen"] .ring ellipse.filled { fill-opacity: 0.04; }

  .ring-ai ellipse { stroke: var(--ai-color); fill: var(--ai-color); filter: drop-shadow(0 0 14px color-mix(in srgb, var(--ai-color) 30%, transparent)); }
  .ring-ml ellipse { stroke: var(--ml-color); fill: var(--ml-color); filter: drop-shadow(0 0 14px color-mix(in srgb, var(--ml-color) 30%, transparent)); }
  .ring-dl ellipse { stroke: var(--dl-color); fill: var(--dl-color); filter: drop-shadow(0 0 14px color-mix(in srgb, var(--dl-color) 35%, transparent)); }
  .ring-nn ellipse { stroke: var(--nn-color); fill: var(--nn-color); filter: drop-shadow(0 0 14px color-mix(in srgb, var(--nn-color) 40%, transparent)); }
  .ring-nn .ring-label { font-size: 18px; letter-spacing: 2.4px; }

  .ring-label {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: 3px;
    text-anchor: middle;
    fill: var(--text-main);
    opacity: 0;
  }
  .ring-desc {
    font-size: 14px;
    font-weight: 500;
    fill: var(--text-dim);
    text-anchor: middle;
    opacity: 0;
  }

  .nn-node {
    fill: var(--nn-color);
    filter: drop-shadow(0 0 6px color-mix(in srgb, var(--nn-color) 70%, transparent));
    opacity: 0;
  }
  .nn-edge {
    stroke: var(--nn-color);
    stroke-width: 1;
    stroke-opacity: 0.25;
    opacity: 0;
  }
  .nn-signal {
    fill: #fff;
    filter: drop-shadow(0 0 8px var(--nn-color)) drop-shadow(0 0 3px #fff);
    opacity: 0;
    pointer-events: none;
  }
  .nn-node.fire {
    filter: drop-shadow(0 0 14px color-mix(in srgb, var(--nn-color) 95%, white))
            drop-shadow(0 0 4px #fff);
  }

  /* Model chips */
  .model-chip {
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.4px;
    text-anchor: middle;
    dominant-baseline: middle;
    opacity: 0;
  }
  .model-chip-bg {
    rx: 10;
    ry: 10;
    opacity: 0;
  }
  .chip-ai-style .model-chip-bg { fill: color-mix(in srgb, var(--ai-color) 15%, transparent); stroke: var(--ai-color); stroke-width: 1; }
  .chip-ai-style .model-chip    { fill: var(--ai-color); }
  .chip-ml-style .model-chip-bg { fill: color-mix(in srgb, var(--ml-color) 15%, transparent); stroke: var(--ml-color); stroke-width: 1; }
  .chip-ml-style .model-chip    { fill: var(--ml-color); }
  .chip-dl-style .model-chip-bg { fill: color-mix(in srgb, var(--dl-color) 15%, transparent); stroke: var(--dl-color); stroke-width: 1; }
  .chip-dl-style .model-chip    { fill: var(--dl-color); }
  .chip-nn-style .model-chip-bg { fill: color-mix(in srgb, var(--nn-color) 15%, transparent); stroke: var(--nn-color); stroke-width: 1; }
  .chip-nn-style .model-chip    { fill: var(--nn-color); }
</style>
</head>
<body>
  <div class="stage">
    <div class="venn-wrap">
      <svg class="venn-svg" viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet">
        <!-- AI outer ellipse: y 30–690 -->
        <g class="ring ring-ai">
          <ellipse cx="600" cy="360" rx="580" ry="330" />
          <text class="ring-label" x="600" y="72">ARTIFICIAL INTELLIGENCE</text>
          <text class="ring-desc"  x="600" y="100">Any technique that enables computers to mimic human behavior.</text>
        </g>

        <!-- ML: y 148–612 -->
        <g class="ring ring-ml">
          <ellipse cx="600" cy="380" rx="440" ry="232" />
          <text class="ring-label" x="600" y="190">MACHINE LEARNING</text>
          <text class="ring-desc"  x="600" y="216">Algorithms whose performance improve as they are exposed to more data.</text>
        </g>

        <!-- Neural Networks: y 252–588 -->
        <g class="ring ring-dl">
          <ellipse cx="610" cy="420" rx="316" ry="168" />
          <text class="ring-label" x="610" y="296">NEURAL NETWORKS</text>
          <text class="ring-desc"  x="610" y="323">A class of models inspired by biological brain structures,</text>
          <text class="ring-desc"  x="610" y="343">using layered nodes to process information.</text>
        </g>

        <!-- Deep Learning: y 394–586 — fully inside NN -->
        <g class="ring ring-nn">
          <ellipse cx="625" cy="490" rx="218" ry="96" />
          <text class="ring-label" x="625" y="430">DEEP LEARNING</text>
          <text class="ring-desc"  x="625" y="454">Specialized, multi-layered neural networks (≥3 layers)</text>
          <text class="ring-desc"  x="625" y="472">that learn from vast amounts of data.</text>
        </g>

        <!-- NN graphic inside DL ellipse -->
        <g class="nn" id="nn"></g>
      </svg>
    </div>
  </div>

  <script>
    const SVG_NS = 'http://www.w3.org/2000/svg';
    let nnPositions = [], nnEdgeMap = [];

    // Build mini neural net inside NN ellipse
    function buildNN() {
      const g = document.getElementById('nn');
      g.innerHTML = '';
      const layers = [3, 5, 5, 4, 2];
      const xStart = 492, xEnd = 758;
      const yTop = 493, yBot = 560;
      nnPositions = layers.map((count, li) => {
        const x = xStart + (xEnd - xStart) * (li / (layers.length - 1));
        const pad = 12;
        const h = yBot - yTop - pad * 2;
        return Array.from({length: count}, (_, i) => ({
          x,
          y: count === 1 ? (yTop + yBot) / 2 : yTop + pad + h * (i / (count - 1))
        }));
      });

      nnEdgeMap = [];
      for (let li = 0; li < nnPositions.length - 1; li++) {
        const layerEdges = [];
        for (const a of nnPositions[li]) {
          for (const b of nnPositions[li + 1]) {
            const line = document.createElementNS(SVG_NS, 'line');
            line.setAttribute('class', 'nn-edge');
            line.setAttribute('x1', a.x); line.setAttribute('y1', a.y);
            line.setAttribute('x2', b.x); line.setAttribute('y2', b.y);
            g.appendChild(line);
            layerEdges.push({ el: line, a, b });
          }
        }
        nnEdgeMap.push(layerEdges);
      }
      nnPositions.flat().forEach((p, i) => {
        const c = document.createElementNS(SVG_NS, 'circle');
        c.setAttribute('class', 'nn-node');
        c.setAttribute('data-idx', i);
        c.setAttribute('cx', p.x); c.setAttribute('cy', p.y); c.setAttribute('r', 4);
        g.appendChild(c);
      });
    }

    // Setup ring tracing: stroke-dasharray = perimeter
    function setupRingTrace() {
      document.querySelectorAll('.ring ellipse').forEach(el => {
        const rx = +el.getAttribute('rx'), ry = +el.getAttribute('ry');
        const perim = Math.PI * (3 * (rx + ry) - Math.sqrt((3 * rx + ry) * (rx + 3 * ry)));
        el.style.strokeDasharray = perim;
        el.style.strokeDashoffset = perim;
        el.classList.remove('filled');
      });
    }

    // Forward propagation pulse — one wave of signals flowing left→right
    function propagate() {
      const g = document.getElementById('nn');
      nnEdgeMap.forEach((layerEdges, li) => {
        const delay = li * 0.55;
        layerEdges.forEach((e, ei) => {
          const signal = document.createElementNS(SVG_NS, 'circle');
          signal.setAttribute('class', 'nn-signal');
          signal.setAttribute('r', 2.8);
          signal.setAttribute('cx', e.a.x);
          signal.setAttribute('cy', e.a.y);
          g.appendChild(signal);
          gsap.to(signal, {
            attr: { cx: e.b.x, cy: e.b.y },
            opacity: 1,
            duration: 0.5,
            delay,
            ease: "power2.in",
            onComplete: () => {
              gsap.to(signal, { opacity: 0, duration: 0.15, onComplete: () => signal.remove() });
            }
          });
        });
        // Receiving layer fires after the signals arrive
        const targetNodes = nnPositions[li + 1].map(p => {
          return document.querySelector(`.nn-node[cx="${p.x}"][cy="${p.y}"]`);
        });
        gsap.delayedCall(delay + 0.5, () => {
          targetNodes.forEach(n => {
            if (!n) return;
            n.classList.add('fire');
            gsap.fromTo(n, { scale: 1 }, {
              scale: 1.6, duration: 0.25, yoyo: true, repeat: 1,
              transformOrigin: "center center", ease: "power2.out",
              onComplete: () => n.classList.remove('fire')
            });
          });
        });
      });
    }

    // Chip data: x/y is the chip center; zone matches ring CSS class suffix
    const CHIPS = [
      // AI-only zone (between AI and ML strokes)
      { label: "IBM Watson",      brand: "IBM",       zone: "ai", x: 168,  y: 308 },
      { label: "Expert Systems",  brand: "",          zone: "ai", x: 168,  y: 447 },
      { label: "AlphaGo",         brand: "DeepMind",  zone: "ai", x: 1025, y: 292 },
      // ML-only zone (between ML and NN strokes)
      { label: "Random Forest",   brand: "",          zone: "ml", x: 193,  y: 416 },
      { label: "SVM",             brand: "",          zone: "ml", x: 193,  y: 476 },
      { label: "Naive Bayes",     brand: "",          zone: "ml", x: 976,  y: 443 },
      // NN zone (above DL, between NN desc and DL top)
      { label: "BERT",            brand: "Google",    zone: "dl", x: 455,  y: 368 },
      { label: "ResNet",          brand: "Meta",      zone: "dl", x: 772,  y: 368 },
      // Deep Learning models (inside NN zone, flanking the DL ellipse)
      { label: "GPT-4o",          brand: "OpenAI",    zone: "nn", x: 353,  y: 455 },
      { label: "LLaMA 3",         brand: "Meta",      zone: "nn", x: 353,  y: 485 },
      { label: "Claude 3.5",      brand: "Anthropic", zone: "nn", x: 872,  y: 450 },
      { label: "Gemini 1.5",      brand: "Google",    zone: "nn", x: 869,  y: 479 },
      { label: "Mistral",         brand: "",          zone: "nn", x: 869,  y: 508 },
    ];

    let chipEls = [];

    function buildChips() {
      const svg = document.querySelector('.venn-svg');
      document.querySelectorAll('.model-chip-group').forEach(el => el.remove());
      chipEls = [];

      CHIPS.forEach(c => {
        const PAD_X = 10, H = 22, FONT = 11;
        // Estimate width: label + brand
        const fullLabel = c.brand ? `${c.label}  ·  ${c.brand}` : c.label;
        const approxW = fullLabel.length * FONT * 0.55 + PAD_X * 2;
        const w = Math.max(60, approxW);

        const g = document.createElementNS(SVG_NS, 'g');
        g.setAttribute('class', `model-chip-group chip-${c.zone}-style`);
        g.style.opacity = 0;

        const rect = document.createElementNS(SVG_NS, 'rect');
        rect.setAttribute('class', 'model-chip-bg');
        rect.setAttribute('x', c.x - w / 2);
        rect.setAttribute('y', c.y - H / 2);
        rect.setAttribute('width', w);
        rect.setAttribute('height', H);
        rect.setAttribute('rx', 9);

        const text = document.createElementNS(SVG_NS, 'text');
        text.setAttribute('class', 'model-chip');
        text.setAttribute('x', c.x);
        text.setAttribute('y', c.y + 1);

        if (c.brand) {
          const tspan1 = document.createElementNS(SVG_NS, 'tspan');
          tspan1.textContent = c.label;
          tspan1.style.fontWeight = '700';
          const tspan2 = document.createElementNS(SVG_NS, 'tspan');
          tspan2.textContent = `  ·  ${c.brand}`;
          tspan2.style.opacity = '0.55';
          tspan2.style.fontWeight = '500';
          text.appendChild(tspan1);
          text.appendChild(tspan2);
        } else {
          text.textContent = c.label;
        }

        g.appendChild(rect);
        g.appendChild(text);
        svg.appendChild(g);
        chipEls.push({ el: g, zone: c.zone });
      });
    }

    let tl, propLoop;
    function runAnimation() {
      if (tl) tl.kill();
      if (propLoop) propLoop.kill();
      gsap.killTweensOf(".ring ellipse, .ring-label, .ring-desc");
      gsap.killTweensOf(".nn-node, .nn-edge, .nn-signal");
      document.querySelectorAll('.nn-signal').forEach(s => s.remove());
      buildNN();
      buildChips();
      setupRingTrace();

      gsap.set(".ring-label, .ring-desc", { opacity: 0, y: 12 });
      gsap.set(".nn-node", { opacity: 0, scale: 0, transformOrigin: "center center" });
      gsap.set(".nn-edge", { opacity: 0, strokeOpacity: 0.25 });
      gsap.set(".ring ellipse", { opacity: 1 });
      gsap.set(".model-chip-group", { opacity: 0, scale: 0.7, transformOrigin: "center center" });

      tl = gsap.timeline({ defaults: { ease: "power2.inOut" } });

      // Helper to choreograph each ring: trace → fill → label → desc
      function revealRing(selector, startAt, labelDelay = 0.6, descDelay = 0.25, traceDur = 1.2) {
        const ell = document.querySelector(`${selector} ellipse`);
        tl.to(ell, { strokeDashoffset: 0, duration: traceDur, ease: "power2.inOut" }, startAt)
          .call(() => ell.classList.add('filled'), null, startAt + traceDur * 0.6)
          .to(`${selector} .ring-label`, { opacity: 1, y: 0, duration: 0.55, ease: "power3.out" }, startAt + labelDelay)
          .to(`${selector} .ring-desc`,  { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, startAt + labelDelay + descDelay);
      }

      // Helper to animate chips for a given zone
      function revealChips(zone, startAt) {
        const els = chipEls.filter(c => c.zone === zone).map(c => c.el);
        if (!els.length) return;
        tl.to(els, { opacity: 1, scale: 1, duration: 0.4, stagger: 0.1, ease: "back.out(1.8)", transformOrigin: "center center" }, startAt);
      }

      // Cinematic reveal: AI → ML → NN → DL, each beat spaced for absorption
      revealRing(".ring-ai", 0.2, 0.55, 0.25, 1.3);
      revealChips("ai", 1.6);

      revealRing(".ring-ml", 2.1, 0.55, 0.25, 1.15);
      revealChips("ml", 3.4);

      revealRing(".ring-dl", 3.6, 0.5, 0.25, 1.0);
      revealChips("dl", 4.75);

      // DL (innermost) ring
      const nnEll = document.querySelector('.ring-nn ellipse');
      tl.to(nnEll, { strokeDashoffset: 0, duration: 0.9, ease: "power2.inOut" }, 5.0)
        .call(() => nnEll.classList.add('filled'), null, 5.55)
        .to(".ring-nn .ring-label", { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 5.5)
        .to(".ring-nn .ring-desc",  { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 5.75);
      revealChips("nn", 5.9);

      // Neural network graphic — edges fade in, nodes pop by layer
      tl.to(".nn-edge", { opacity: 1, duration: 0.45, stagger: { each: 0.004, from: "start" } }, 6.1);
      nnPositions.forEach((layer, li) => {
        const nodesInLayer = layer.map(p => document.querySelector(`.nn-node[cx="${p.x}"][cy="${p.y}"]`));
        tl.to(nodesInLayer, { opacity: 1, scale: 1, duration: 0.4, stagger: 0.04, ease: "back.out(2.2)" }, 6.2 + li * 0.12);
      });

      // Subtle breathing on rings
      gsap.to(".ring-ai ellipse", { scale: 1.01,  duration: 4.0, repeat: -1, yoyo: true, ease: "sine.inOut", transformOrigin: "center center", delay: 8 });
      gsap.to(".ring-ml ellipse", { scale: 1.012, duration: 3.6, repeat: -1, yoyo: true, ease: "sine.inOut", transformOrigin: "center center", delay: 8.2 });
      gsap.to(".ring-dl ellipse", { scale: 1.015, duration: 3.2, repeat: -1, yoyo: true, ease: "sine.inOut", transformOrigin: "center center", delay: 8.4 });
      gsap.to(".ring-nn ellipse", { scale: 1.02,  duration: 2.8, repeat: -1, yoyo: true, ease: "sine.inOut", transformOrigin: "center center", delay: 8.6 });

      // Ambient chip float
      gsap.to(".model-chip-group", {
        y: "random(-4, 4)", duration: "random(2.5, 4)", repeat: -1, yoyo: true,
        ease: "sine.inOut", stagger: { each: 0.15, from: "random" }, delay: 8
      });

      // Forward propagation loop
      gsap.delayedCall(7.2, () => {
        propagate();
        propLoop = gsap.timeline({ repeat: -1 });
        propLoop.to({}, { duration: 3.8, onComplete: propagate });
      });
    }

    window.addEventListener('load', runAnimation);

    window.addEventListener('message', (e) => {
      if (!e.data) return;
      if (e.data.type === 'SET_THEME') {
        const palette = e.data.palette || (e.data.mode === 'light' ? 'Paper White' : 'Midnight');
        let key = palette.toLowerCase().replace(/\s+/g, '-');
        if (key === 'dark') key = 'midnight';
        if (key === 'light') key = 'paper-white';
        document.body.setAttribute('data-theme', key);
      }
      if (e.data.type === 'RESTART_ANIMATION') runAnimation();
    });
  </script>
</body>
</html>
